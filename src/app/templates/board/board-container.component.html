<div>
  <div class="board-header">
    <H1>{{board().name}}</H1>
    <button (click)="openNewTaskModal()">Add Task</button>
  </div>

  <div class="widget-row">
    <dynamic-widgets-component></dynamic-widgets-component>
  </div>

  <div class="status-columns">
    @for(column of board().columns; track column.id) {
      <board-column [column]="column"></board-column>
    }
  </div>

  <global-error-component></global-error-component>

</div>
