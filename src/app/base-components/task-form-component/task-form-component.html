

<form class="new-task-form" [formGroup]="taskForm" (ngSubmit)="onSubmit()">
  <input type="text" placeholder="Title" required formControlName="title">
  <textarea placeholder="Description" formControlName="description"></textarea>
  <input type="text" placeholder="Assignee" formControlName="assignee">
  <select name="priority" formControlName="priority" required>
    <option value="urgent">Urgent</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>

  <input [disabled]="taskForm.invalid" type="submit">
</form>
